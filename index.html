<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字智能核对助手</title>
    
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.1.0/diff.min.js"></script>

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #e67e22 0%, #d35400 100%);
            --bg-color: #f8fafc;
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            --diff-add: #dcfce7;
            --diff-remove: #fee2e2;
            --text-main: #1e293b;
        }

        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg-color); margin: 0; padding: 40px 20px; color: var(--text-main); }
        
        /* 标题美化 */
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { 
            font-size: 36px; 
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }
        .header p { color: #64748b; font-size: 16px; font-weight: 300; }

        .container { max-width: 1300px; margin: 0 auto; }

        /* 上传卡片 */
        .upload-section { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 30px; }
        .upload-card { 
            background: #fff; border: 2px dashed #cbd5e1; border-radius: 16px; 
            padding: 40px 20px; text-align: center; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer; position: relative;
        }
        .upload-card:hover { 
            border-color: #e67e22; transform: translateY(-4px);
            box-shadow: var(--card-shadow);
            background: #fffdfb;
        }
        .upload-card svg { width: 48px; height: 48px; margin-bottom: 16px; fill: #94a3b8; transition: 0.3s; }
        .upload-card:hover svg { fill: #e67e22; }
        .file-name { margin-top: 12px; font-size: 14px; color: #e67e22; font-weight: 600; min-height: 20px; }

        /* 智能按钮 */
        .btn-action { 
            width: 100%; height: 60px; background: var(--primary-gradient); color: white; 
            border: none; border-radius: 12px; font-size: 18px; font-weight: 600; 
            cursor: pointer; margin-bottom: 40px; transition: 0.3s;
            box-shadow: 0 4px 12px rgba(230, 126, 34, 0.3);
        }
        .btn-action:hover { opacity: 0.9; transform: scale(1.01); }
        .btn-action:active { transform: scale(0.99); }

        /* 对比面板 */
        .compare-panel { 
            background: #fff; border-radius: 20px; box-shadow: var(--card-shadow); 
            overflow: hidden; display: grid; grid-template-columns: 1fr 1fr;
            border: 1px solid #e2e8f0;
        }
        .pane-label { 
            padding: 15px 25px; background: #f1f5f9; font-weight: 600; 
            font-size: 14px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; gap: 8px;
        }
        .pane-label::before { content: ''; width: 8px; height: 8px; background: #e67e22; border-radius: 50%; }

        .viewer { 
            height: 650px; overflow-y: scroll; padding: 30px; 
            font-size: 15px; line-height: 2.2; color: #334155;
            background-image: linear-gradient(#f1f5f9 1px, transparent 1px);
            background-size: 100% 2.2em; /* 模拟信纸行线 */
        }
        .viewer:first-of-type { border-right: 1px solid #f1f5f9; }

        /* 差异文本效果 */
        .added { background: var(--diff-add); color: #166534; padding: 2px 0; border-radius: 2px; }
        .removed { background: var(--diff-remove); color: #991b1b; text-decoration: line-through; padding: 2px 0; border-radius: 2px; }
        .page-header { 
            display: block; margin: 30px 0 10px 0; color: #e67e22; 
            font-weight: 800; font-size: 13px; text-transform: uppercase;
            border-left: 4px solid #e67e22; padding-left: 10px;
        }

        /* 隐藏滚动条但保留功能 (针对 Chrome) */
        .viewer::-webkit-scrollbar { width: 6px; }
        .viewer::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h1>文字智能核对助手</h1>
    <p>基于 AI 逻辑的精准文档差异分析</p>
</div>

<div class="container">
    <div class="upload-section">
        <div class="upload-card" onclick="document.getElementById('inA').click()">
            <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
            <h3>上传待核对原件</h3>
            <div id="infoA" class="file-name">支持 PDF, Word, Excel</div>
            <input type="file" id="inA" hidden>
        </div>
        <div class="upload-card" onclick="document.getElementById('inB').click()">
            <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
            <h3>上传最新版本文件</h3>
            <div id="infoB" class="file-name">本地处理，隐私安全</div>
            <input type="file" id="inB" hidden>
        </div>
    </div>

    <button class="btn-action" id="goBtn">立即开始智能核对</button>

    <div class="compare-panel">
        <div class="pane-label">原件内容预览</div>
        <div class="pane-label">对比修订预览</div>
        <div id="v1" class="viewer">请先上传左侧文件...</div>
        <div id="v2" class="viewer">请先上传右侧文件...</div>
    </div>
</div>
<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let contentA = "";
    let contentB = "";

    // 绑定上传逻辑
    document.getElementById('inA').onchange = (e) => loadFile(e.target.files[0], 'A');
    document.getElementById('inB').onchange = (e) => loadFile(e.target.files[0], 'B');

    async function loadFile(file, side) {
        if (!file) return;
        document.getElementById('info' + side).innerText = "已就绪: " + file.name;
        
        const ext = file.name.split('.').pop().toLowerCase();
        let text = "";

        try {
            if (ext === 'pdf') {
                const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    text += `[PAGE_${i}]\n` + content.items.map(s => s.str).join(" ") + "\n";
                }
            } else if (ext === 'docx') {
                const res = await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
                text = res.value;
            } else if (ext.includes('xls')) {
                const wb = XLSX.read(await file.arrayBuffer());
                text = XLSX.utils.sheet_to_txt(wb.Sheets[wb.SheetNames[0]]);
            }
            if (side === 'A') contentA = text; else contentB = text;
        } catch (err) { alert("读取失败：" + err.message); }
    }

    document.getElementById('goBtn').onclick = () => {
        if (!contentA || !contentB) return alert("请先上传两个文件再进行对比。");
        
        const btn = document.getElementById('goBtn');
        btn.innerText = "深度分析中...";
        
        // 延迟执行以便 UI 更新
        setTimeout(() => {
            const diffs = Diff.diffLines(contentA, contentB);
            const v1 = document.getElementById('v1');
            const v2 = document.getElementById('v2');
            v1.innerHTML = ''; v2.innerHTML = '';

            diffs.forEach(part => {
                const cleanText = (t) => t.replace(/\[PAGE_(\d+)\]/g, '<span class="page-header">PAGE $1</span>');
                
                if (part.added) {
                    v2.appendChild(createSpan(cleanText(part.value), 'added'));
                    v1.appendChild(createSpan('\n'.repeat((part.value.match(/\n/g) || []).length + 1), '')); 
                } else if (part.removed) {
                    v1.appendChild(createSpan(cleanText(part.value), 'removed'));
                    v2.appendChild(createSpan('\n'.repeat((part.value.match(/\n/g) || []).length + 1), ''));
                } else {
                    v1.appendChild(createSpan(cleanText(part.value), ''));
                    v2.appendChild(createSpan(cleanText(part.value), ''));
                }
            });

            v1.onscroll = () => v2.scrollTop = v1.scrollTop;
            v2.onscroll = () => v1.scrollTop = v2.scrollTop;
            
            btn.innerText = "核对完成";
            setTimeout(() => btn.innerText = "立即开始智能核对", 2000);
        }, 100);
    };

    function createSpan(txt, cls) {
        const s = document.createElement('span');
        if (cls) s.className = cls;
        s.innerHTML = txt;
        return s;
    }
</script>
</body>
</html>
