<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 文字智能核对助手</title>
    
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.1.0/diff.min.js"></script>

    <style>
        :root {
            --primary-orange: #e67e22;
            --bg-gray: #f4f7f9;
            --border-color: #e0e0e0;
            --text-dark: #2c3e50;
            --diff-add: #e6ffec;
            --diff-remove: #ffebe9;
        }

        body { font-family: "Microsoft YaHei", sans-serif; background: var(--bg-gray); margin: 0; padding: 20px; color: var(--text-dark); }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 28px; color: #d35400; margin-bottom: 8px; }
        .header p { color: #7f8c8d; font-size: 14px; margin: 0; }

        .main-card { max-width: 1200px; margin: 0 auto; background: #fff; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.06); padding: 30px; }

        /* 上传卡片布局 */
        .upload-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .upload-box { 
            border: 2px dashed #dcdde1; border-radius: 10px; padding: 30px; text-align: center; 
            background: #fff; transition: all 0.3s ease; cursor: pointer; position: relative;
        }
        .upload-box:hover { border-color: var(--primary-orange); background: #fffaf5; }
        .upload-box h3 { font-size: 16px; margin: 0 0 10px 0; color: #34495e; }
        .file-info { font-size: 13px; color: var(--primary-orange); font-weight: bold; min-height: 18px; }
        
        /* 橙色核心按钮 */
        .btn-compare { 
            width: 100%; background: var(--primary-orange); color: white; border: none; 
            padding: 16px; border-radius: 8px; font-size: 18px; font-weight: bold; 
            cursor: pointer; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(230, 126, 34, 0.2);
            transition: background 0.2s;
        }
        .btn-compare:hover { background: #d35400; }

        /* 对比网格 */
        .compare-grid { 
            display: grid; grid-template-columns: 1fr 1fr; 
            border: 1px solid var(--border-color); border-radius: 6px; overflow: hidden;
            background: #fff;
        }
        .column-header { 
            background: #f8f9fa; padding: 12px 20px; font-weight: bold; font-size: 14px; 
            border-bottom: 1px solid var(--border-color); color: #57606f;
        }
        .content-view { 
            height: 600px; overflow-y: scroll; padding: 25px; 
            font-size: 14px; line-height: 2; white-space: pre-wrap; word-break: break-all;
            scroll-behavior: smooth;
        }
        .content-view:first-of-type { border-right: 1px solid var(--border-color); }

        /* 差异高亮 */
        .added { background: var(--diff-add); color: #22863a; border-bottom: 1px solid #2da44e; }
        .removed { background: var(--diff-remove); color: #cf222e; text-decoration: line-through; }
        .placeholder { display: inline-block; color: transparent; user-select: none; background: #fafafa; }
        .page-mark { color: #27ae60; font-weight: bold; display: block; margin: 20px 0 10px 0; padding-bottom: 5px; border-bottom: 1px dashed #eee; }
    </style>
</head>
<body>

<div class="header">
    <h1>📄 PDF 文字智能核对助手</h1>
    <p>自动提取文档文本并同步对比内容差异，支持 PDF / Word / Excel</p>
</div>

<div class="main-card">
    <div class="upload-container">
        <div class="upload-box" onclick="document.getElementById('fileA').click()">
            <h3>📁 原件 PDF (Base)</h3>
            <input type="file" id="fileA" hidden accept=".pdf,.docx,.xlsx">
            <div id="nameA" class="file-info">点击上传或拖入文件</div>
        </div>
        <div class="upload-box" onclick="document.getElementById('fileB').click()">
            <h3>📁 新版 PDF (Compare)</h3>
            <input type="file" id="fileB" hidden accept=".pdf,.docx,.xlsx">
            <div id="nameB" class="file-info">点击上传或拖入文件</div>
        </div>
    </div>

    <button class="btn-compare" id="startBtn">开始核对内容</button>

    <div class="compare-grid">
        <div class="column-header">原件内容 (按页展示)</div>
        <div class="column-header">新版内容 (按页展示)</div>
        <div id="view1" class="content-view">请在上方上传文件 A</div>
        <div id="view2" class="content-view">请在上方上传文件 B</div>
    </div>
</div>
<script>
    // 初始化 PDF.js Worker
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let dataA = { text: "", raw: null };
    let dataB = { text: "", raw: null };

    // 文件上传监听
    document.getElementById('fileA').onchange = (e) => handleFile(e.target.files[0], 'A');
    document.getElementById('fileB').onchange = (e) => handleFile(e.target.files[0], 'B');

    async function handleFile(file, type) {
        if (!file) return;
        document.getElementById('name' + type).innerText = "已加载: " + file.name;
        
        const ext = file.name.split('.').pop().toLowerCase();
        let extractedText = "";

        try {
            if (ext === 'pdf') {
                const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    // 插入特殊的页码标记，方便后续渲染
                    extractedText += `[[PAGE_${i}]]\n` + content.items.map(s => s.str).join(" ") + "\n";
                }
            } else if (ext === 'docx') {
                const res = await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
                extractedText = res.value;
            } else if (ext.includes('xls')) {
                const wb = XLSX.read(await file.arrayBuffer());
                extractedText = XLSX.utils.sheet_to_txt(wb.Sheets[wb.SheetNames[0]]);
            }

            if (type === 'A') dataA.text = extractedText;
            else dataB.text = extractedText;
        } catch (err) {
            alert("文件解析出错：" + err.message);
        }
    }

    // 执行对比
    document.getElementById('startBtn').onclick = () => {
        if (!dataA.text || !dataB.text) return alert("请确保左右两个文件都已上传成功！");
        
        const v1 = document.getElementById('view1');
        const v2 = document.getElementById('view2');
        v1.innerHTML = '分析中...'; v2.innerHTML = '分析中...';

        // 使用 jsdiff 进行行级对比
        const diffs = Diff.diffLines(dataA.text, dataB.text);
        
        v1.innerHTML = ''; v2.innerHTML = '';

        diffs.forEach(part => {
            // 处理页码标记的显示
            const processText = (txt) => txt.replace(/\[\[PAGE_(\d+)\]\]/g, '<span class="page-mark">第 $1 页：</span>');

            if (part.added) {
                // 右侧新增内容
                const spanR = createSpan(processText(part.value), 'added');
                const spanL = createSpan(part.value.replace(/[^\n]/g, ' '), 'placeholder'); // 左侧留空
                v1.appendChild(spanL);
                v2.appendChild(spanR);
            } else if (part.removed) {
                // 左侧删除内容
                const spanL = createSpan(processText(part.value), 'removed');
                const spanR = createSpan(part.value.replace(/[^\n]/g, ' '), 'placeholder'); // 右侧留空
                v1.appendChild(spanL);
                v2.appendChild(spanR);
            } else {
                // 无差异内容
                const commonL = createSpan(processText(part.value), '');
                const commonR = createSpan(processText(part.value), '');
                v1.appendChild(commonL);
                v2.appendChild(commonR);
            }
        });

        // 绑定左右同步滚动
        v1.onscroll = () => v2.scrollTop = v1.scrollTop;
        v2.onscroll = () => v1.scrollTop = v2.scrollTop;
        
        alert("核对完成！差异已高亮显示。");
    };

    function createSpan(content, className) {
        const span = document.createElement('span');
        if (className) span.className = className;
        span.innerHTML = content;
        return span;
    }
</script>
</body>
</html>
