<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字智能核对助手</title>
    
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.1.0/diff.min.js"></script>

    <style>
        :root {
            --primary: #e67e22;
            --bg: #f8fafc;
            --diff-add: #dcfce7;
            --diff-remove: #fee2e2;
        }

        body { font-family: 'PingFang SC', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; }
        
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { 
            font-size: 32px; background: linear-gradient(135deg, #e67e22 0%, #d35400 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0 0 8px 0;
        }
        .header p { color: #64748b; font-size: 14px; margin: 0; }

        .container { max-width: 1200px; margin: 0 auto; }

        /* 上传区域高度优化 */
        .upload-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .upload-card { 
            background: #fff; border: 2px dashed #cbd5e1; border-radius: 12px; 
            padding: 20px; text-align: center; transition: all 0.2s ease;
            cursor: pointer; position: relative;
        }
        /* 拖拽激活样式 */
        .upload-card.drag-over { 
            border-color: var(--primary); background: #fffaf5; transform: scale(1.02);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        
        .upload-card h3 { font-size: 15px; margin: 10px 0 5px 0; color: #475569; }
        .file-name { font-size: 12px; color: var(--primary); font-weight: 600; min-height: 16px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .btn-action { 
            width: 100%; height: 50px; background: linear-gradient(135deg, #e67e22 0%, #d35400 100%); 
            color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; 
            cursor: pointer; margin-bottom: 20px; transition: 0.2s;
        }
        .btn-action:hover { opacity: 0.9; }

        .compare-panel { 
            background: #fff; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
            display: grid; grid-template-columns: 1fr 1fr; border: 1px solid #e2e8f0;
        }
        .pane-label { padding: 12px 20px; background: #f1f5f9; font-weight: 600; font-size: 13px; border-bottom: 1px solid #e2e8f0; }
        .viewer { 
            height: 550px; overflow-y: scroll; padding: 25px; font-size: 14px; line-height: 2.2; color: #334155;
            background-image: linear-gradient(#f1f5f9 1px, transparent 1px); background-size: 100% 2.2em;
        }
        .viewer:first-of-type { border-right: 1px solid #f1f5f9; }

        .added { background: var(--diff-add); color: #166534; }
        .removed { background: var(--diff-remove); color: #991b1b; text-decoration: line-through; }
        .page-header { display: block; margin: 20px 0 10px 0; color: var(--primary); font-weight: 800; font-size: 12px; border-left: 3px solid var(--primary); padding-left: 8px; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h1>文字智能核对助手</h1>
    <p>支持 PDF / Word / Excel 同步对比</p>
</div>

<div class="container">
    <div class="upload-section">
        <div class="upload-card" id="dropA">
            <h3 id="labelA">📤 上传待核对原件</h3>
            <div id="infoA" class="file-name">点击或拖拽文件至此</div>
            <input type="file" id="inA" hidden>
        </div>
        <div class="upload-box upload-card" id="dropB">
            <h3 id="labelB">📤 上传最新版本文件</h3>
            <div id="infoB" class="file-name">点击或拖拽文件至此</div>
            <input type="file" id="inB" hidden>
        </div>
    </div>

    <button class="btn-action" id="goBtn">立即开始智能核对</button>

    <div class="compare-panel">
        <div class="pane-label">原件预览区</div>
        <div class="pane-label">对比修订区</div>
        <div id="v1" class="viewer"></div>
        <div id="v2" class="viewer"></div>
    </div>
</div>
<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let contentA = "";
    let contentB = "";

    // 拖拽逻辑封装
    function initDragDrop(dropZoneId, inputId, side) {
        const zone = document.getElementById(dropZoneId);
        const input = document.getElementById(inputId);

        zone.onclick = () => input.click();

        // 拖入效果
        zone.addEventListener('dragover', (e) => {
            e.preventDefault();
            zone.classList.add('drag-over');
        });

        zone.addEventListener('dragleave', () => {
            zone.classList.remove('drag-over');
        });

        // 丢下文件
        zone.addEventListener('drop', (e) => {
            e.preventDefault();
            zone.classList.remove('drag-over');
            if (e.dataTransfer.files.length) {
                loadFile(e.dataTransfer.files[0], side);
            }
        });

        input.onchange = (e) => loadFile(e.target.files[0], side);
    }

    initDragDrop('dropA', 'inA', 'A');
    initDragDrop('dropB', 'inB', 'B');

    async function loadFile(file, side) {
        if (!file) return;
        document.getElementById('info' + side).innerText = "已加载: " + file.name;
        
        const ext = file.name.split('.').pop().toLowerCase();
        let text = "";

        try {
            if (ext === 'pdf') {
                const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    text += `[PAGE_${i}]\n` + content.items.map(s => s.str).join(" ") + "\n";
                }
            } else if (ext === 'docx') {
                const res = await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
                text = res.value;
            } else if (ext.includes('xls')) {
                const wb = XLSX.read(await file.arrayBuffer());
                text = XLSX.utils.sheet_to_txt(wb.Sheets[wb.SheetNames[0]]);
            }
            if (side === 'A') contentA = text; else contentB = text;
        } catch (err) { alert("解析失败: " + err.message); }
    }

    document.getElementById('goBtn').onclick = () => {
        if (!contentA || !contentB) return alert("请上传两个文件进行核对");
        
        const diffs = Diff.diffLines(contentA, contentB);
        const v1 = document.getElementById('v1');
        const v2 = document.getElementById('v2');
        v1.innerHTML = ''; v2.innerHTML = '';

        diffs.forEach(part => {
            const clean = (t) => t.replace(/\[PAGE_(\d+)\]/g, '<span class="page-header">PAGE $1</span>');
            const lineCount = (part.value.match(/\n/g) || []).length;

            if (part.added) {
                v2.appendChild(createSpan(clean(part.value), 'added'));
                v1.appendChild(createSpan('\n'.repeat(lineCount + 1), '')); 
            } else if (part.removed) {
                v1.appendChild(createSpan(clean(part.value), 'removed'));
                v2.appendChild(createSpan('\n'.repeat(lineCount + 1), ''));
            } else {
                v1.appendChild(createSpan(clean(part.value), ''));
                v2.appendChild(createSpan(clean(part.value), ''));
            }
        });

        v1.onscroll = () => v2.scrollTop = v1.scrollTop;
        v2.onscroll = () => v1.scrollTop = v2.scrollTop;
    };

    function createSpan(txt, cls) {
        const s = document.createElement('span');
        if (cls) s.className = cls;
        s.innerHTML = txt;
        return s;
    }
</script>
</body>
</html>
