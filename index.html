<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>文字智能核对助手</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.1.0/diff.min.js"></script>

    <style>
        :root { 
            --primary: #1a73e8; /* 改为蓝色 */
            --primary-hover: #1557b0;
            --bg: #f8f9fa; 
            --diff-add: #e6ffec; 
            --diff-remove: #ffebe9; 
        }
        body { font-family: 'PingFang SC', sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #3c4043; }
        .header { text-align: center; margin-bottom: 15px; }
        .header h1 { font-size: 26px; color: var(--primary); margin: 0; }
        
        /* 极致压缩上传框 */
        .upload-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .drop-card { 
            background: #fff; border: 2px dashed #dadce0; border-radius: 8px; 
            height: 55px; display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.2s;
        }
        .drop-card:hover, .drop-card.drag-over { border-color: var(--primary); background: #f1f8ff; border-style: solid; }
        .drop-card h3 { font-size: 13px; margin: 0; color: #5f6368; pointer-events: none; }
        .file-info { font-size: 11px; color: var(--primary); font-weight: bold; margin-top: 2px; pointer-events: none; max-width: 90%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .btn-run { 
            width: 100%; height: 42px; background: var(--primary); color: white; border: none; 
            border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; margin-bottom: 15px; transition: 0.2s;
        }
        .btn-run:hover { background: var(--primary-hover); box-shadow: 0 1px 3px rgba(60,64,67,0.3); }

        .main-view { background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(60,64,67,0.12); display: grid; grid-template-columns: 1fr 1fr; border: 1px solid #dadce0; overflow: hidden; }
        .label { padding: 8px 15px; background: #f8f9fa; font-size: 12px; font-weight: bold; border-bottom: 1px solid #dadce0; color: #5f6368; }
        .viewer { height: 500px; overflow-y: auto; padding: 15px; font-size: 13px; line-height: 2; white-space: pre-wrap; word-break: break-all; }
        .viewer:first-of-type { border-right: 1px solid #dadce0; }

        /* 差异高亮效果 */
        .added { background: var(--diff-add); color: #137333; }
        .removed { background: var(--diff-remove); color: #d93025; text-decoration: line-through; }
        .page-tag { display: block; background: #e8f0fe; color: #1a73e8; padding: 2px 8px; border-left: 3px solid #1a73e8; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

<div class="header"><h1>文字智能核对助手</h1></div>

<div class="upload-row">
    <div class="drop-card" id="cardA">
        <input type="file" id="fileA" hidden accept=".pdf,.docx,.xlsx,.xls">
        <h3>📄 点击或拖入原件</h3>
        <div id="txtA" class="file-info">未选择文件</div>
    </div>
    <div class="drop-card" id="cardB">
        <input type="file" id="fileB" hidden accept=".pdf,.docx,.xlsx,.xls">
        <h3>📄 点击或拖入新版</h3>
        <div id="txtB" class="file-info">未选择文件</div>
    </div>
</div>

<button class="btn-run" id="btnRun">立即开始智能对比</button>

<div class="main-view">
    <div class="label">原件预览 (BASE)</div><div class="label">修订预览 (COMPARE)</div>
    <div id="v1" class="viewer"></div><div id="v2" class="viewer"></div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    let data = { A: "", B: "" };

    // 事件绑定与拖拽拦截
    function setup(cardId, inputId, key) {
        const card = document.getElementById(cardId);
        const input = document.getElementById(inputId);

        card.onclick = () => input.click();

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(n => {
            card.addEventListener(n, (e) => { e.preventDefault(); e.stopPropagation(); });
        });

        card.addEventListener('dragover', () => card.classList.add('drag-over'));
        card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
        card.addEventListener('drop', (e) => {
            card.classList.remove('drag-over');
            if (e.dataTransfer.files[0]) process(e.dataTransfer.files[0], key);
        });

        input.onchange = (e) => process(e.target.files[0], key);
    }

    setup('cardA', 'fileA', 'A');
    setup('cardB', 'fileB', 'B');

    // 处理文件：修复 Excel 乱码
    async function process(file, key) {
        if (!file) return;
        document.getElementById('txt' + key).innerText = "已就绪：" + file.name;
        const ext = file.name.split('.').pop().toLowerCase();
        let out = "";

        try {
            if (ext === 'xlsx' || ext === 'xls') {
                // 使用 ArrayBuffer 读取，彻底解决二进制乱码
                const arrayBuffer = await file.arrayBuffer();
                const workbook = XLSX.read(new Uint8Array(arrayBuffer), { type: 'array' });
                workbook.SheetNames.forEach(name => {
                    const sheet = workbook.Sheets[name];
                    out += `[表格: ${name}]\n`;
                    // 转为文本并清理多余的制表符
                    out += XLSX.utils.sheet_to_txt(sheet) + "\n";
                });
            } else if (ext === 'pdf') {
                const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    out += `[第 ${i} 页]\n` + content.items.map(s => s.str).join(" ") + "\n";
                }
            } else if (ext === 'docx') {
                const res = await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
                out = res.value;
            }
            data[key] = out;
        } catch (e) {
            console.error(e);
            alert("解析失败，请确保文件未加密且格式正确");
        }
    }

    // 对比渲染
    document.getElementById('btnRun').onclick = () => {
        if (!data.A || !data.B) return alert("请先上传待比对的文件");
        
        const v1 = document.getElementById('v1');
        const v2 = document.getElementById('v2');
        v1.innerHTML = '分析中...'; v2.innerHTML = '分析中...';

        // 稍微延迟确保 UI 更新
        setTimeout(() => {
            const diffs = Diff.diffLines(data.A, data.B);
            v1.innerHTML = ''; v2.innerHTML = '';

            diffs.forEach(part => {
                const html = part.value.replace(/\[(第 \d+ 页|表格: .*?)\]/g, '<span class="page-tag">$1</span>');
                const lines = (part.value.match(/\n/g) || []).length;

                if (part.added) {
                    v2.appendChild(createNode(html, 'added'));
                    v1.appendChild(createNode('\n'.repeat(lines + 1), ''));
                } else if (part.removed) {
                    v1.appendChild(createNode(html, 'removed'));
                    v2.appendChild(createNode('\n'.repeat(lines + 1), ''));
                } else {
                    v1.appendChild(createNode(html, ''));
                    v2.appendChild(createNode(html, ''));
                }
            });

            v1.onscroll = () => v2.scrollTop = v1.scrollTop;
            v2.onscroll = () => v1.scrollTop = v2.scrollTop;
        }, 50);
    };

    function createNode(html, cls) {
        const s = document.createElement('span');
        if (cls) s.className = cls;
        s.innerHTML = html;
        return s;
    }
</script>
</body>
</html>
